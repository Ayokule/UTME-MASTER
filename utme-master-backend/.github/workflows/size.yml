# ==========================================
# PR SIZE LABELER
# ==========================================
# Automatically label PRs by size

name: PR Size

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  size-label:
    name: Label by Size
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: Check PR size
        uses: "pascalgn/size-label-action@v0.5.5"
        env:
          GITHUB_TOKEN: "${{ secrets.GITHUB_TOKEN }}"
        with:
          sizes: |
            small: 0
            medium: 50
            large: 200
          fallback-sizes: |
            small: 0
            medium: 50
            large: 200
