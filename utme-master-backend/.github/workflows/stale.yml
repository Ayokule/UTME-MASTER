# ==========================================
# STALE ISSUE/PR HANDLER
# ==========================================
# Automatically close stale issues and PRs

name: Mark Stale Issues and PRs

on:
  schedule:
    - cron: "0 9 * * 1-5"  # Every weekday at 9 AM
  workflow_dispatch:

jobs:
  stale:
    name: Stale Checker
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write
    steps:
      - name: Mark stale issues and PRs
        uses: actions/stale@v9
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          days-before-stale: 30
          days-before-close: 7
          stale-issue-message: >
            This issue has been automatically marked as stale because it has not had
            recent activity. It will be closed if no further activity occurs. Thank you
            for your contributions.
          stale-pr-message: >
            This PR has been automatically marked as stale because it has not had
            recent activity. It will be closed if no further activity occurs. Thank you
            for your contributions.
          close-issue-message: >
            This issue has been automatically closed due to inactivity.
          close-pr-message: >
            This PR has been automatically closed due to inactivity.
          stale-issue-label: "status:stale"
          stale-pr-label: "status:stale"
          exempt-issue-labels: "status:in-progress,status:blocked,status:pinned"
          exempt-pr-labels: "status:in-progress,status:blocked,status:pinned"
          operations-per-run: 100
