# ==========================================
# UTME MASTER - COMPLETE DOCKER COMPOSE
# ==========================================
# Combines frontend and backend services
# Production-ready with health checks and networking

version: '3.8'

services:
  # ==========================================
  # PostgreSQL Database
  # ==========================================
  db:
    image: postgres:15-alpine
    container_name: utme-master-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-utme_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-utme_password}
      POSTGRES_DB: ${POSTGRES_DB:-utme_master}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./prisma/migrations:/docker-entrypoint-initdb.d/migrations
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-utme_user} -d ${POSTGRES_DB:-utme_master}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - utme-network

  # ==========================================
  # Backend API
  # ==========================================
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: utme-master-backend
    restart: unless-stopped
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: ${PORT:-5000}
      DATABASE_URL: ${DATABASE_URL:-postgresql://utme_user:utme_password@db:5432/utme_master}
      JWT_SECRET: ${JWT_SECRET:-change-this-in-production}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:5173}
      SMTP_HOST: ${SMTP_HOST:-smtp.gmail.com}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USERNAME: ${SMTP_USERNAME:-your-email@gmail.com}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-your-app-password}
      FROM_EMAIL: ${FROM_EMAIL:-noreply@utmemaster.com}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:5173}
      ENABLE_RATE_LIMIT: ${ENABLE_RATE_LIMIT:-true}
      RATE_LIMIT_WINDOW_MS: ${RATE_LIMIT_WINDOW_MS:-60000}
      RATE_LIMIT_MAX: ${RATE_LIMIT_MAX:-100}
    ports:
      - "${PORT:-5000}:5000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./logs:/app/logs
      - ./uploads:/app/uploads
    networks:
      - utme-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # ==========================================
  # Frontend Application
  # ==========================================
  frontend:
    build:
      context: ../utme-master-frontend
      dockerfile: Dockerfile
    container_name: utme-master-frontend
    restart: unless-stopped
    environment:
      VITE_API_URL: ${VITE_API_URL:-http://localhost:5000/api}
      VITE_APP_NAME: ${VITE_APP_NAME:-UTME Master}
      VITE_APP_URL: ${VITE_APP_URL:-http://localhost:5173}
      VITE_ENABLE_ANALYTICS: ${VITE_ENABLE_ANALYTICS:-true}
      VITE_ENABLE_PDF_EXPORT: ${VITE_ENABLE_PDF_EXPORT:-true}
    ports:
      - "${FRONTEND_PORT:-80}:80"
    depends_on:
      - backend
    networks:
      - utme-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:80/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

networks:
  utme-network:
    driver: bridge

volumes:
  postgres_data:
    driver: local
